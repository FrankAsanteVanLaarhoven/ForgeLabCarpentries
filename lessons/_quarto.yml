project:
  type: website
  output-dir: _site

website:
  title: "ForgeLab Carpentries"
  description: "Hands-on workshops for robotics, autonomy, and applied AI."
  site-url: "https://frankasantevanlaarhoven.github.io/ForgeLabCarpentries"
  repo-url: "https://github.com/FrankAsanteVanLaarhoven/ForgeLabCarpentries"
  repo-actions: [edit, issue]
  page-navigation: true
  back-to-top-navigation: true
  navbar:
    background: primary
    search: true
    left:
      - text: "Home"
        file: index.qmd
      - text: "Setup"
        file: setup.qmd
      - text: "Reference"
        file: reference.qmd
      - text: "Instructor Notes"
        file: instructor-notes.qmd
    right:
      - icon: github
        href: "https://github.com/FrankAsanteVanLaarhoven/ForgeLabCarpentries"
        aria-label: GitHub
  sidebar:
    style: docked
    contents:
      - section: "Foundations & Robotics"
        contents:
          - episodes/01-intro-unix-shell.qmd
          - episodes/02-git-version-control.qmd
          - episodes/03-ros2-navigation.qmd
      - section: "R for Reproducible Science"
        contents:
          - episodes/r-01-intro-r-rstudio.qmd
          - episodes/r-02-project-management.qmd
          - episodes/r-03-seeking-help.qmd
          - episodes/r-04-data-structures.qmd
          - episodes/r-05-exploring-data-frames.qmd
          - episodes/r-06-subsetting-data.qmd
          - episodes/r-07-control-flow.qmd
          - episodes/r-08-ggplot2.qmd
          - episodes/r-09-vectorization.qmd
          - episodes/r-10-functions.qmd
          - episodes/r-11-reading-writing-data.qmd
          - episodes/r-12-dplyr.qmd
          - episodes/r-13-tidyr.qmd
          - episodes/r-14-quarto-reports.qmd
          - episodes/r-15-writing-good-software.qmd
      - section: "AI & World Models"
        contents:
          - episodes/ai-11-language-models.qmd
          - episodes/ai-12-vln.qmd
          - episodes/ai-13-vla.qmd
          - episodes/ai-14-world-models.qmd
          - episodes/ai-15-evaluation-safety.qmd
  page-footer:
    center: "Content CC-BY 4.0 · Code MIT · ForgeLab Carpentries"

format:
  html:
    theme:
      - cosmo
    toc: true
    toc-depth: 3
    code-copy: true
    code-overflow: wrap
    highlight-style: github
    callout-appearance: simple

# Lessons mix prose with executable cells. Default to NOT re-executing on
# every render (set to true per-episode when cells must run live).
execute:
  freeze: auto
  echo: true
