name: CI

# Validate contributions on every push and pull request:
#  - the lesson site renders cleanly
#  - internal links aren't broken
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  render:
    name: Render lessons
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: quarto-dev/quarto-actions/setup@v2

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Render (fails the build on errors)
        run: quarto render lessons

      - name: Upload rendered site for link check
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: lessons/_site

  links:
    name: Link check
    needs: render
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download rendered site
        uses: actions/download-artifact@v4
        with:
          name: site
          path: lessons/_site

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --accept 200,206,429 "lessons/_site/**/*.html"
          fail: false
