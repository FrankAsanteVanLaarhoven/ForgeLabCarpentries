name: Publish lesson site

# Render the Quarto lesson site (lessons/) and deploy it to GitHub Pages.
on:
  push:
    branches: [main]
    paths:
      - "lessons/**"
      - "requirements.txt"
      - ".github/workflows/publish.yml"
  workflow_dispatch:

# Permissions required to deploy to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Render lesson site
        run: quarto render lessons

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: lessons/_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
